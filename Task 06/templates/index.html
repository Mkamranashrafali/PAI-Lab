<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="wrapper">
        <h1>Animal Detector</h1>
        <p class="subtitle">Upload an image or video to detect animals</p>

        <div class="panel">
            <form id="mainForm">
                <div class="field">
                    <label>Select File</label>
                    <input type="file" id="inputFile" accept="image/*,video/*" required>
                </div>

                <div class="gps-toggle">
                    <label><input type="checkbox" id="autoGps"> Use Auto GPS</label>
                </div>

                <div id="manualLoc">
                    <div class="row">
                        <div class="field">
                            <label>Latitude</label>
                            <input type="number" id="latVal" value="40.7128" step="0.0001">
                        </div>
                        <div class="field">
                            <label>Longitude</label>
                            <input type="number" id="lonVal" value="-74.0060" step="0.0001">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-main">Detect Animals</button>
            </form>
        </div>

        <div class="panel" id="outputPanel" style="display:none;">
            <h2>Results</h2>
            <div id="imgBox" class="media-box" style="display:none;">
                <img id="outImg" src="">
            </div>
            <div id="vidBox" class="media-box" style="display:none;">
                <video id="outVid" controls></video>
            </div>
            <h3>Location Map</h3>
            <div id="mapBox"></div>
            <button class="btn-main" onclick="location.reload()">New Scan</button>
        </div>
    </div>

    <div id="loader" style="display:none;">
        <div class="spinner"></div>
        <p>Processing...</p>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
